[build]
  command = "npm --prefix astro-site run build"
  publish = "astro-site/dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.gstatic.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://*.googleapis.com https://*.gstatic.com https://www.googletagmanager.com https://api.exchangerate-api.com https://flagcdn.com https://*.cloudfunctions.net; form-action 'self' https://wa.me; upgrade-insecure-requests"

[[headers]]
  for = "/admin-v3/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[redirects]]
  from = "/ae/"
  to = "/ae.html"
  status = 200

[[redirects]]
  from = "/sa/"
  to = "/sa.html"
  status = 200

[[redirects]]
  from = "/qa/"
  to = "/qa.html"
  status = 200

[[redirects]]
  from = "/kw/"
  to = "/kw.html"
  status = 200

[[redirects]]
  from = "/eg/"
  to = "/eg.html"
  status = 200

